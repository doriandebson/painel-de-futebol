<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>вљЅ Painel de Futebol - Dashboard Profissional</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-header: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --border: #334155;
            --live-color: #ef4444;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        header h1 { margin: 0; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .controls { display: flex; gap: 10px; }
        .controls select {
            padding: 8px 12px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .main-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1.5fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
        }
        .section-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--text-muted); font-weight: 600; }
        tr:hover { background-color: rgba(255,255,255,0.02); }
        .text-center { text-align: center; }
        .flex-align { display: flex; align-items: center; gap: 8px; }
        .crest { width: 20px; height: 20px; object-fit: contain; }
        
        .matches-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) { .matches-split { grid-template-columns: 1fr; } }
        .mini-match-card {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 8px;
            position: relative;
            transition: border-color 0.3s;
        }
        .mini-match-card.live-card {
            border-color: var(--live-color);
            background-color: rgba(239, 68, 68, 0.05);
        }
        .match-row { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
        .match-team { display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .match-score { font-family: monospace; font-weight: bold; background: #334155; padding: 1px 6px; border-radius: 3px; }
        .mini-match-card.live-card .match-score { background: var(--live-color); color: #fff; }
        .match-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; margin-top: 6px; border-top: 1px dashed var(--border); padding-top: 4px; }
        
        .badge-live {
            background-color: var(--live-color);
            color: white;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<header>
    <h1>вљЅ Painel de Futebol | Dashboard</h1>
    <div class="controls">
        <select id="stageSelector" onchange="loadDashboard()">

            <option value="QUARTER_FINALS">рџ—“пёЏ Quartas de Final</option>
            <option value="SEMI_FINALS">рџ—“пёЏ Semifinais</option>
            <option value="THIRD_PLACE">рџ—“пёЏ Terceiro Lugar</option>
            <option value="FINAL">рџЏ† Final</option>
        </select>

        <select id="leagueSelector" onchange="loadDashboard()">

            <option value="BSA">рџ‡§рџ‡· BrasileirГЈo SГ©rie A</option>
            <option value="PL">рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї Premier League (Inglaterra)</option>
            <option value="PD">рџ‡Єрџ‡ё LaLiga (Espanha)</option>
            <option value="CL">рџЏ† UEFA Champions League</option>
            <option value="BL1">рџ‡©рџ‡Є Bundesliga (Alemanha)</option>
        </select>
    </div>
</header>

<div class="main-container">
    <div id="leftColumn">
        <div class="section-box">
            <div class="matches-split">
                <div>
                    <h2 class="section-title" id="titleLeftMatches">Partidas Recentes</h2>
                    <div id="recentMatches">Carregando...</div>
                </div>
                <div>
                    <h2 class="section-title" id="titleRightMatches">PrГіximas Partidas</h2>
                    <div id="nextMatches">Carregando...</div>
                </div>
            </div>
        </div>

        <div class="section-box" id="scorersBox">
            <h2 class="section-title">Artilharia</h2>
            <table id="scorersTable">
                <thead>
                    <tr>
                        <th style="width: 40px;">Pos</th>
                        <th>Jogador</th>
                        <th>Time</th>
                        <th class="text-center">Gols</th>
                        <th class="text-center">AssistГЄncias</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5">Carregando artilharia...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="standingsBox">
        <div class="section-box">
            <h2 class="section-title">ClassificaГ§ГЈo</h2>
            <div id="standingsTablesContainer">
                <p>Carregando classification...</p>
            </div>
        </div>
    </div>
</div>

<script>

        }

        // Se for selecionado uma fase eliminatГіria (Mata-Mata)
