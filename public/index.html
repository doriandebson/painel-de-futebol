<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Painel de Futebol - Dashboard Profissional</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-header: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --border: #334155;
            --live-color: #ef4444;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        header h1 { margin: 0; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .controls { display: flex; gap: 10px; }
        .controls select {
            padding: 8px 12px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .main-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1.5fr;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
        }
        .section-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--text-muted); font-weight: 600; }
        tr:hover { background-color: rgba(255,255,255,0.02); }
        .text-center { text-align: center; }
        .flex-align { display: flex; align-items: center; gap: 8px; }
        .crest { width: 20px; height: 20px; object-fit: contain; }
        
        .matches-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) { .matches-split { grid-template-columns: 1fr; } }
        .mini-match-card {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 8px;
            position: relative;
            transition: border-color 0.3s;
        }
        .mini-match-card.live-card {
            border-color: var(--live-color);
            background-color: rgba(239, 68, 68, 0.05);
        }
        .match-row { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
        .match-team { display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .
